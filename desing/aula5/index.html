<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- colspan - muda o layout da tabela, falando quantas partes aquele td vai ocupar na coluna -->
    <!-- rowspan - muda o layout da tabela, falando quantas partes aquele td vai ocupar na linha -->
    
    <table border="1">
       
        <tr>
            <td colspan="4">Candidato Eliminado</td>

        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td colspan="2">7</td>
        </tr>
        <tr>
            <td rowspan="2">9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
    </table>


</body>
</html>
